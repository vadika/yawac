name: release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: bridge/go.mod
          cache-dependency-path: bridge/go.sum
      - name: Install XcodeGen + Sparkle
        run: |
          brew install xcodegen
          brew install --cask sparkle
      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          gomobile init
      - name: Compute version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAG="${GITHUB_REF_NAME}"
          else
            BASE=$(awk -F'"' '/CFBundleShortVersionString/{print $2; exit}' project.yml)
            VERSION="${BASE}-dev+$(git rev-parse --short=7 HEAD)"
            TAG="dev-$(git rev-parse --short=7 HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - name: Import Developer ID certificate
        env:
          BUILD_CERT_BASE64: ${{ secrets.BUILD_CERT_BASE64 }}
          BUILD_CERT_PASSWORD: ${{ secrets.BUILD_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/dev-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo -n "$BUILD_CERT_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$BUILD_CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          # Sanity print the identity name (no secrets).
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
      - name: Stash Sparkle EdDSA private key
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          KEY_PATH="$RUNNER_TEMP/sparkle.ed-private.pem"
          printf "%s" "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "SPARKLE_PRIVATE_KEY_FILE=$KEY_PATH" >> "$GITHUB_ENV"
          # generate_keys + sign_update ship from the Sparkle cask in
          # /opt/homebrew/Caskroom/sparkle/<version>/bin; surface the
          # path so release-edge.sh can call them.
          SIGN_UPDATE=$(find /opt/homebrew/Caskroom/sparkle -name sign_update | head -1)
          echo "SIGN_UPDATE_BIN=$SIGN_UPDATE" >> "$GITHUB_ENV"
      - name: Build + sign + notarize + zip
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SIGN_IDENTITY: "Developer ID Application"
          TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_APP_PASSWORD: ${{ secrets.NOTARY_APP_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
        run: ./scripts/release-edge.sh
      - name: SHA256
        id: sum
        run: |
          SUM=$(shasum -a 256 "build/dist/yawac-${{ steps.ver.outputs.version }}.zip" | awk '{print $1}')
          echo "sha256=${SUM}" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          ASSETS=("build/dist/yawac-${VERSION}.zip")
          if [ -f "build/dist/appcast.xml" ]; then
            ASSETS+=("build/dist/appcast.xml")
          fi
          gh release create "$TAG" \
            "${ASSETS[@]}" \
            --title "$VERSION" \
            --notes "Release $VERSION"
      - name: Bump + commit cask
        if: github.ref_type == 'tag'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SHA256: ${{ steps.sum.outputs.sha256 }}
        run: |
          git fetch origin main
          git checkout main
          ./scripts/bump-cask.sh
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/yawac.rb
          if git diff --cached --quiet; then
            echo "no cask change"
            exit 0
          fi
          git commit -m "chore(cask): bump to ${VERSION} [skip ci]"
          git push origin main
