name: release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: bridge/go.mod
          cache-dependency-path: bridge/go.sum
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          gomobile init
      - name: Compute version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            # Stable release: tag drives the version. Pushed tag is vX.Y.Z;
            # the cask / asset / release title use the bare X.Y.Z.
            VERSION="${GITHUB_REF_NAME#v}"
            TAG="${GITHUB_REF_NAME}"
          else
            # Manual dispatch: a throwaway dev build, no GitHub release.
            BASE=$(awk -F'"' '/CFBundleShortVersionString/{print $2; exit}' project.yml)
            VERSION="${BASE}-dev+$(git rev-parse --short=7 HEAD)"
            TAG="dev-$(git rev-parse --short=7 HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - name: Build + sign + zip
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: ./scripts/release-edge.sh
      - name: SHA256
        id: sum
        run: |
          SUM=$(shasum -a 256 "build/dist/yawac-${{ steps.ver.outputs.version }}.zip" | awk '{print $1}')
          echo "sha256=${SUM}" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          gh release create "$TAG" \
            "build/dist/yawac-${VERSION}.zip" \
            --title "$VERSION" \
            --notes "Release $VERSION"
      - name: Bump + commit cask
        if: github.ref_type == 'tag'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SHA256: ${{ steps.sum.outputs.sha256 }}
        run: |
          git fetch origin main
          git checkout main
          ./scripts/bump-cask.sh
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/yawac.rb
          if git diff --cached --quiet; then
            echo "no cask change"
            exit 0
          fi
          git commit -m "chore(cask): bump to ${VERSION} [skip ci]"
          git push origin main
