name: yawac
options:
  deploymentTarget:
    macOS: "14.0"
  bundleIdPrefix: dev.vadikas.yawac
settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_HARDENED_RUNTIME: YES
targets:
  yawac:
    type: application
    platform: macOS
    sources:
      - path: yawac
        excludes:
          - "Resources/Fonts/**"
          - "Resources/Assets.xcassets/**"
      - path: yawac/Resources/Fonts
        type: folder
      - path: yawac/Resources/Assets.xcassets
    dependencies:
      - framework: build/Bridge.xcframework
        embed: true
    settings:
      base:
        OTHER_LDFLAGS: -lresolv
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: yawac/Info.plist
      properties:
        NSAppleEventsUsageDescription: yawac needs Apple events for notifications
        LSMinimumSystemVersion: "14.0"
        CFBundleDisplayName: yawac
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        ATSApplicationFontsPath: Fonts
        CFBundleIconName: AppIcon
  yawacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: yawacTests
    dependencies:
      - target: yawac
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
