name: yawac
options:
  deploymentTarget:
    macOS: "14.0"
  bundleIdPrefix: dev.vadikas.yawac
settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_HARDENED_RUNTIME: YES
packages:
  MLXSwiftExamples:
    url: https://github.com/ml-explore/mlx-swift-examples
    from: "2.29.1"
  COpus:
    path: Packages/COpus
targets:
  yawac:
    type: application
    platform: macOS
    sources:
      - path: yawac
        excludes:
          - "Resources/Fonts/**"
      - path: yawac/Resources/Fonts
        type: folder
    dependencies:
      - framework: build/Bridge.xcframework
        embed: true
      - package: MLXSwiftExamples
        product: MLXLLM
      - package: MLXSwiftExamples
        product: MLXLMCommon
      - package: COpus
        product: Opus
      - package: COpus
        product: COpus
    settings:
      base:
        OTHER_LDFLAGS: -lresolv
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: yawac/Info.plist
      properties:
        NSAppleEventsUsageDescription: yawac needs Apple events for notifications
        NSMicrophoneUsageDescription: yawac needs the microphone to record voice messages
        NSLocationWhenInUseUsageDescription: yawac uses your location only when you choose Send current location.
        LSMinimumSystemVersion: "14.0"
        CFBundleDisplayName: yawac
        CFBundleShortVersionString: "0.9.32"
        CFBundleVersion: "47"
        ATSApplicationFontsPath: Fonts
        CFBundleIconName: AppIcon
  yawacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: yawacTests
    dependencies:
      - target: yawac
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
