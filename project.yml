name: yawac
options:
  deploymentTarget:
    macOS: "14.0"
  bundleIdPrefix: dev.vadikas.yawac
settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_HARDENED_RUNTIME: YES
packages:
  MLXSwiftExamples:
    url: https://github.com/ml-explore/mlx-swift-examples
    from: "2.29.1"
  COpus:
    path: Packages/COpus
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.3"
targets:
  yawac:
    type: application
    platform: macOS
    sources:
      - path: yawac
        excludes:
          - "Resources/Fonts/**"
      - path: yawac/Resources/Fonts
        type: folder
    dependencies:
      - framework: build/Bridge.xcframework
        embed: true
      - package: MLXSwiftExamples
        product: MLXLLM
      - package: MLXSwiftExamples
        product: MLXLMCommon
      - package: COpus
        product: Opus
      - package: COpus
        product: COpus
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        OTHER_LDFLAGS: -lresolv
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: yawac/yawac.entitlements
      configs:
        # F40: Debug builds run locally during dev. Use Apple
        # Development automatic signing so the app keeps a stable
        # team-bound identity across rebuilds — macOS treats
        # ad-hoc-signed apps as a fresh bundle every launch, which
        # resets notification authorization, badge counts, and Focus
        # rules. Apple Development uses the free dev cert, no
        # notarization needed; SPM packages auto-sign with the same
        # team and don't conflict.
        Debug:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Development: Vadim Likholetov (W76P62BYGQ)"
          DEVELOPMENT_TEAM: WJ65XC5777
          PROVISIONING_PROFILE_SPECIFIER: ""
    info:
      path: yawac/Info.plist
      properties:
        NSAppleEventsUsageDescription: yawac needs Apple events for notifications
        NSMicrophoneUsageDescription: yawac needs the microphone to record voice messages
        NSLocationWhenInUseUsageDescription: yawac uses your location only when you choose Send current location.
        LSMinimumSystemVersion: "14.0"
        CFBundleDisplayName: yawac
        CFBundleShortVersionString: "0.10.13"
        CFBundleVersion: "96"
        ATSApplicationFontsPath: Fonts
        CFBundleIconName: AppIcon
        # F72: prevent macOS from spawning a second yawac instance when
        # the user taps a notification banner. Launch Services routes
        # notification activation to whichever yawac.app bundle it
        # picked for the bundle id (multiple bundles register over a
        # dev's lifetime — build/dd, DerivedData, /Applications/...);
        # without this flag a fresh process can be spawned even though
        # the running yawac is the one that posted the notification.
        LSMultipleInstancesProhibited: true
        SUFeedURL: https://github.com/vadika/yawac/releases/latest/download/appcast.xml
        SUPublicEDKey: YnHi982nr0r5CHtPBFeDiVttVsizvUQKlgH1TMeM0DE=
        SUEnableInstallerLauncherService: false
  yawacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: yawacTests
    dependencies:
      - target: yawac
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
